version: 0.2

phases:
  install:
    commands:
      - echo Installing NVM and Node.js
      - curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.3/install.sh | bash
      - source ~/.bashrc
      - nvm install v14.10.0
      - nvm use v14.10.0
      - node --version
      - npm --version
  build:
    commands:
      - echo Build started on `date`
      - npm install
      - npm run build
  post_build:
    commands:
      - echo Build completed on `date`
artifacts:
  files:
    - "**/*"
